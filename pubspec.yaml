name: nabour_app
description: "Nabour — cursă cu un vecin. Simplu, gratuit, între prieteni."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Core UI & State Management
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  
  # Voice AI & Speech (WORKING)
  flutter_tts: ^3.8.5
  speech_to_text: ^7.3.0
  google_generative_ai: ^0.4.0
  
  # Network & Data
  http: ^1.1.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  
  # Location & Maps
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  mapbox_maps_flutter: ^2.10.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_cache: ^1.5.2
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_db_store: ^6.0.0
  
  # System Information & Monitoring
  device_info_plus: ^11.5.0
  battery_plus: ^6.0.3
  connectivity_plus: ^6.0.3
  sentry_flutter: ^9.14.0
  
  # Database & Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Scheduling
  cron: ^0.6.0
  add_2_calendar: ^3.0.0
  
  # Firebase
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.1
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  
  # Social Login
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  flutter_facebook_auth: ^7.1.2
  
  # Firebase Real-time & Messaging
  firebase_analytics: ^12.0.0
  firebase_app_check: ^0.4.0+1
  cloud_functions: ^6.0.0
  firebase_crashlytics: ^5.0.0
  
  # Maps Alternative (WORKING)
  google_maps_flutter: ^2.5.0
  geocoding: ^4.0.0
  
  # Utility & UI
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.3.0
  share_plus: ^11.1.0
  uuid: ^4.3.3
  crypto: ^3.0.3
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  file_picker: ^10.3.2
  audioplayers: ^6.0.0
  # Android AudioManager / focus + iOS AVAudioSession (voice chat); folosit cu [record]
  audio_session: ^0.2.3
  record: ^6.1.2
  emoji_picker_flutter: ^2.0.0
  wakelock_plus: ^1.1.4
  shimmer: ^3.0.0
  
  # PDF & Printing
  pdf: ^3.11.0
  printing: ^5.13.1
  flutter_local_notifications: ^19.4.1
  flutter_native_splash: ^2.4.1
  flutter_contacts: ^2.0.0
  package_info_plus: ^9.0.0
  open_file: ^3.5.11
  dio: ^5.9.2
  firebase_database: ^12.2.0
  firebase_remote_config: ^6.3.0
  sensors_plus: ^7.0.0
  torch_light: ^1.1.0
  home_widget: ^0.9.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  
  # Linting & Code Quality
  flutter_lints: ^6.0.0
  
  # Testing
  mockito: ^5.4.4
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

# App Icons Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#1976D2"
    theme_color: "#1976D2"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 48

# Flutter Configuration
flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/images/avatars/
    - assets/icons/
    - assets/animations/
    - assets/audio/
    - assets/data/
    - assets/poi/
    - assets/sounds/
    - assets/models/
    # Fonturi custom (opțional): decomentează după ce adaugi fișierele în assets/fonts/
    # - assets/fonts/

  # Fonturi: folosim implicit Material (Roboto pe Android, San Francisco pe iOS).
  # Pentru fonturi custom, adaugă fișierele în assets/fonts/ și decomentează blocul de mai jos.
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Roboto-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #   - family: DancingScript
  #     fonts:
  #       - asset: assets/fonts/DancingScript-VariableFont_wght.ttf

flutter_native_splash:
  color: "#7C3AED"
  # Removed image to avoid showing a pin on splash
  android_12:
    color: "#7C3AED"
    # Removed image on Android 12 splash as well
  ios: true
  web: false